<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    background: linear-gradient(135deg, #020617, #0f172a, #111827);
    color: #f8fafc;
    padding: 40px;
  }

  .container {
    max-width: 1200px;
    margin: auto;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header h1 {
    font-size: 42px;
    margin-bottom: 10px;
    background: linear-gradient(to right, #38bdf8, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header p {
    color: #94a3b8;
    font-size: 18px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
  }

  .card {
    background: rgba(15, 23, 42, 0.85);
    padding: 25px;
    border-radius: 18px;
    transition: 0.3s;
    border: 1px solid rgba(148, 163, 184, 0.15);
    box-shadow: 0 0 25px rgba(15, 23, 42, 0.4);
  }

  .card:hover {
    transform: translateY(-6px);
    border-color: #38bdf8;
    box-shadow: 0 0 25px rgba(56, 189, 248, 0.25);
  }

  .card h2 {
    font-size: 18px;
    margin-bottom: 15px;
    color: #38bdf8;
  }

  .metric {
    font-size: 34px;
    font-weight: bold;
    margin-bottom: 10px;
    color: #ffffff;
  }

  .status {
    margin-top: 10px;
    color: #22c55e;
    font-weight: bold;
  }

  .health-score {
    background: linear-gradient(135deg, #1d4ed8, #7c3aed, #0ea5e9);
    padding: 40px;
    border-radius: 22px;
    margin-top: 30px;
    text-align: center;
    box-shadow: 0 0 40px rgba(59, 130, 246, 0.3);
  }

  .health-score h2 {
    font-size: 28px;
    margin-bottom: 15px;
    color: #ffffff;
  }

  .score {
    font-size: 80px;
    font-weight: bold;
    color: #ffffff;
  }

  .checks {
    margin-top: 40px;
    background: rgba(15, 23, 42, 0.85);
    border-radius: 20px;
    padding: 30px;
    border: 1px solid rgba(148, 163, 184, 0.15);
    box-shadow: 0 0 25px rgba(15, 23, 42, 0.35);
  }

  .checks h2 {
    margin-bottom: 20px;
    color: #38bdf8;
  }

  .check-item {
    display: flex;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid rgba(148, 163, 184, 0.1);
    color: #e2e8f0;
  }

  .success {
    color: #22c55e;
    font-weight: bold;
  }

  .footer {
    text-align: center;
    margin-top: 40px;
    color: #94a3b8;
  }

  .badge {
    display: inline-block;
    padding: 8px 14px;
    border-radius: 50px;
    background: linear-gradient(to right, #06b6d4, #8b5cf6);
    color: white;
    font-size: 14px;
    margin-top: 10px;
    box-shadow: 0 0 15px rgba(139, 92, 246, 0.35);
  }
</style>
